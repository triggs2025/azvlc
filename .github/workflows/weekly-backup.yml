name: Weekly Backup

on:
  schedule:
    - cron: '0 6 * * 0'  # Every Sunday at 6am UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create backup zip
        run: |
          BACKUP_DATE=$(date +%Y-%m-%d)
          zip -r "azvlc-backup-${BACKUP_DATE}.zip" . -x ".git/*"
          echo "BACKUP_DATE=${BACKUP_DATE}" >> $GITHUB_ENV
          echo "BACKUP_FILE=azvlc-backup-${BACKUP_DATE}.zip" >> $GITHUB_ENV

      - name: Create release with backup
        uses: softprops/action-gh-release@v2
        with:
          tag_name: backup-${{ env.BACKUP_DATE }}
          name: Backup ${{ env.BACKUP_DATE }}
          body: Weekly automated backup created on ${{ env.BACKUP_DATE }}
          files: ${{ env.BACKUP_FILE }}

      - name: Delete old backups (keep last 2)
        uses: actions/github-script@v7
        with:
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            const backups = releases.data
              .filter(r => r.tag_name.startsWith('backup-'))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            const toDelete = backups.slice(2);

            for (const release of toDelete) {
              console.log(`Deleting old backup: ${release.tag_name}`);
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id
              });
              try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `tags/${release.tag_name}`
                });
              } catch (e) {}
            }
